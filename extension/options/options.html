<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Social Archive 설정</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f13;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 40px 24px;
    }

    .container { max-width: 560px; margin: 0 auto; }

    h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle { font-size: 13px; color: #64748b; margin-bottom: 32px; }

    .section {
      background: #1a1a2e;
      border: 1px solid #2d2d44;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 20px;
    }

    .section-title {
      font-size: 13px;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 14px;
      color: #cbd5e1;
      margin-bottom: 6px;
    }

    .hint { font-size: 12px; color: #475569; margin-bottom: 10px; }

    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 10px 14px;
      background: #0f0f13;
      border: 1px solid #2d2d44;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus { border-color: #6366f1; }

    .field { margin-bottom: 20px; }

    .btn {
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: opacity 0.2s;
    }

    .btn:hover { opacity: 0.85; }

    .btn-primary {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white;
      width: 100%;
    }

    .toast {
      display: none;
      margin-top: 12px;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      background: #1e3a1e;
      color: #4ade80;
      border: 1px solid #166534;
    }

    .toast.show { display: block; }

    .link {
      color: #6366f1;
      text-decoration: none;
      font-size: 12px;
    }

    .link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Social Archive</h1>
    <p class="subtitle">SNS 좋아요·저장 콘텐츠 통합 관리</p>

    <!-- Claude API 키 -->
    <div class="section">
      <div class="section-title">AI 카테고리 분류</div>

      <div class="field">
        <label>Claude API 키</label>
        <p class="hint">
          콘텐츠 자동 분류에 사용됩니다. 없으면 규칙 기반으로만 동작합니다.<br>
          <a class="link" href="https://console.anthropic.com/" target="_blank">키 발급받기 →</a>
        </p>
        <input type="password" id="claudeApiKey" placeholder="sk-ant-..." />
      </div>
    </div>

    <!-- YouTube 설정 -->
    <div class="section">
      <div class="section-title">YouTube 연동</div>

      <div class="field">
        <label>Google OAuth Client ID</label>
        <p class="hint">
          YouTube 좋아요 동영상을 가져오는 데 필요합니다.<br>
          <a class="link" href="https://console.cloud.google.com/" target="_blank">Google Cloud Console →</a>
        </p>
        <input type="text" id="youtubeClientId" placeholder="123456789-abc.apps.googleusercontent.com" />
      </div>
    </div>

    <button class="btn btn-primary" id="saveBtn">저장</button>
    <div class="toast" id="toast">설정이 저장되었습니다.</div>
  </div>

  <script type="module" src="options.js"></script>
</body>
</html>
