<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Social Archive</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f13;
      color: #e2e8f0;
    }

    /* ── 헤더 ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 16px 12px;
      border-bottom: 1px solid #1e1e30;
    }

    .logo {
      font-size: 15px;
      font-weight: 700;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .settings-btn {
      background: none;
      border: none;
      color: #475569;
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
      padding: 2px 4px;
    }

    .settings-btn:hover { color: #94a3b8; }

    /* ── 통계 카드 ── */
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 16px;
    }

    .stat-card {
      background: #1a1a2e;
      border: 1px solid #2d2d44;
      border-radius: 10px;
      padding: 12px;
      text-align: center;
    }

    .stat-value {
      font-size: 24px;
      font-weight: 700;
      color: #6366f1;
    }

    .stat-label {
      font-size: 11px;
      color: #64748b;
      margin-top: 2px;
    }

    /* ── 플랫폼 상태 ── */
    .platforms {
      padding: 0 16px 12px;
    }

    .platform-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #1e1e30;
    }

    .platform-row:last-child { border-bottom: none; }

    .platform-name {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
    }

    .platform-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .dot-instagram { background: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
    .dot-youtube   { background: #ff0000; }

    .platform-count { font-size: 13px; color: #64748b; }

    /* ── 액션 버튼 ── */
    .actions {
      padding: 0 16px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .btn {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: opacity 0.2s;
    }

    .btn:hover:not(:disabled) { opacity: 0.85; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-primary {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white;
    }

    .btn-secondary {
      background: #1a1a2e;
      border: 1px solid #2d2d44;
      color: #94a3b8;
    }

    /* ── 상태 메시지 ── */
    .status {
      padding: 0 16px 12px;
      font-size: 12px;
      color: #475569;
      text-align: center;
      min-height: 20px;
    }

    .status.syncing { color: #6366f1; }
    .status.success { color: #4ade80; }
    .status.error   { color: #f87171; }
  </style>
</head>
<body>

  <div class="header">
    <span class="logo">Social Archive</span>
    <button class="settings-btn" id="settingsBtn" title="설정">⚙</button>
  </div>

  <div class="stats">
    <div class="stat-card">
      <div class="stat-value" id="totalCount">-</div>
      <div class="stat-label">전체 콘텐츠</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="todayCount">-</div>
      <div class="stat-label">오늘 수집</div>
    </div>
  </div>

  <div class="platforms">
    <div class="platform-row">
      <span class="platform-name">
        <span class="platform-dot dot-instagram"></span>
        Instagram
      </span>
      <span class="platform-count" id="igCount">-</span>
    </div>
    <div class="platform-row">
      <span class="platform-name">
        <span class="platform-dot dot-youtube"></span>
        YouTube
      </span>
      <span class="platform-count" id="ytCount">-</span>
    </div>
  </div>

  <div class="status" id="status"></div>

  <div class="actions">
    <button class="btn btn-primary" id="dashboardBtn">대시보드 열기</button>
    <button class="btn btn-secondary" id="ytSyncBtn">YouTube 좋아요 동기화</button>
    <button class="btn btn-secondary" id="ytSavedSyncBtn">YouTube 저장 동기화</button>
    <button class="btn btn-secondary" id="reclassifyBtn">기존 아이템 카테고리 분류</button>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
