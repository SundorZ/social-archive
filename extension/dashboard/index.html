<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Social Archive</title>
  <link rel="manifest" href="manifest.json">
  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f0f13;
      --surface:   #1a1a2e;
      --border:    #2d2d44;
      --accent:    #6366f1;
      --accent2:   #8b5cf6;
      --text:      #e2e8f0;
      --muted:     #64748b;
      --danger:    #f87171;
      --success:   #4ade80;
      --ig-grad:        linear-gradient(135deg, #f09433, #e6683c, #dc2743, #bc1888);
      --yt-color:       #ff0000;
      --pinterest-color: #e60023;
    }

    html, body { height: 100%; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Pretendard, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
    }

    /* ── 레이아웃 ── */
    .app { display: flex; flex-direction: column; height: 100vh; }

    /* 상단 헤더 */
    .topbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 20px;
      height: 56px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .logo {
      font-size: 17px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      white-space: nowrap;
    }

    .search-wrap { flex: 1; max-width: 400px; position: relative; }

    .search-input {
      width: 100%;
      padding: 8px 14px 8px 36px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-input:focus { border-color: var(--accent); }

    .search-icon {
      position: absolute;
      left: 11px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 14px;
    }

    .total-badge {
      margin-left: auto;
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
    }

    /* 본문 (사이드바 + 그리드) */
    .body { display: flex; flex: 1; overflow: hidden; }

    /* ── 사이드바 ── */
    .sidebar {
      width: 200px;
      flex-shrink: 0;
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .filter-group-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      user-select: none;
    }
    .filter-group-title:hover { color: var(--text); }

    .toggle-arrow {
      font-size: 9px;
      transition: transform 0.2s;
      color: var(--muted);
    }
    .filter-group.collapsed .toggle-arrow { transform: rotate(-90deg); }
    .filter-group.collapsed .filter-group-body { display: none; }

    .filter-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      padding: 7px 10px;
      border-radius: 7px;
      border: none;
      background: transparent;
      color: var(--muted);
      font-size: 13px;
      cursor: pointer;
      text-align: left;
      transition: background 0.15s, color 0.15s;
      margin-bottom: 2px;
    }

    .filter-btn:hover { background: var(--surface); color: var(--text); }

    .filter-btn.active {
      background: rgba(99,102,241,0.15);
      color: var(--accent);
    }

    .filter-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .dot-all       { background: var(--accent); }
    .dot-instagram { background: linear-gradient(135deg, #f09433, #dc2743, #bc1888); }
    .dot-youtube   { background: var(--yt-color); }
    .dot-pinterest { background: var(--pinterest-color); }

    .filter-count {
      margin-left: auto;
      font-size: 11px;
      color: var(--muted);
    }

    /* ── 콘텐츠 그리드 ── */
    .main { flex: 1; overflow-y: auto; padding: 20px; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 14px;
    }

    /* ── 카드 ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.15s, border-color 0.15s;
      position: relative;
    }

    .card:hover { transform: translateY(-2px); border-color: var(--accent); }

    .card-delete {
      position: absolute;
      top: 6px;
      right: 6px;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: none;
      background: rgba(0,0,0,0.55);
      color: #fff;
      font-size: 14px;
      line-height: 1;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1;
      transition: background 0.15s;
    }

    .card:hover .card-delete { display: flex; }
    .card-delete:hover { background: var(--danger); }

    .card-thumb {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      background: var(--border);
      display: block;
    }

    .card-thumb-placeholder {
      width: 100%;
      aspect-ratio: 1 / 1;
      background: var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
    }

    .card-body { padding: 10px 12px 12px; }

    .card-platform {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 10px;
      color: var(--muted);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .platform-icon { font-size: 10px; }

    .card-title {
      font-size: 13px;
      line-height: 1.4;
      color: var(--text);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 8px;
    }

    .card-tags { display: flex; flex-wrap: wrap; gap: 4px; }

    .tag {
      padding: 2px 7px;
      border-radius: 20px;
      font-size: 10px;
      background: rgba(99,102,241,0.15);
      color: var(--accent);
    }

    .card-collection {
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 6px;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 8px;
    }

    .card-date { font-size: 11px; color: var(--muted); }

    .card-author { font-size: 11px; color: var(--muted); }

    /* ── 빈 상태 ── */
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }

    .empty-icon { font-size: 48px; margin-bottom: 16px; }
    .empty-title { font-size: 16px; color: var(--text); margin-bottom: 8px; }
    .empty-desc { font-size: 13px; line-height: 1.6; }

    /* ── 토바 아이콘 버튼 ── */
    .icon-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--muted);
      cursor: pointer;
      font-size: 15px;
      padding: 6px 9px;
      line-height: 1;
      transition: color 0.15s, border-color 0.15s;
      white-space: nowrap;
    }
    .icon-btn:hover { color: var(--text); border-color: var(--accent); }

    /* ── 모달 ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
      padding: 16px;
    }
    .modal-overlay.hidden { display: none; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      width: 100%; max-width: 560px;
      max-height: 90vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .modal-thumb-wrap {
      width: 100%;
      aspect-ratio: 16/9;
      background: var(--border);
      flex-shrink: 0;
      border-radius: 15px 15px 0 0;
      overflow: hidden;
    }
    .modal-thumb-wrap img {
      width: 100%; height: 100%; object-fit: cover; display: block;
    }
    .modal-thumb-placeholder {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-size: 48px;
    }

    .modal-body { padding: 20px; display: flex; flex-direction: column; gap: 12px; }

    .modal-meta {
      display: flex; align-items: center; gap: 8px;
      font-size: 11px; color: var(--muted); text-transform: uppercase;
    }
    .modal-source-badge {
      padding: 2px 8px; border-radius: 20px; font-size: 10px; font-weight: 600;
    }
    .badge-liked      { background: rgba(245,158,11,0.2); color: #f59e0b; }
    .badge-saved      { background: rgba(34,211,238,0.2); color: #22d3ee; }
    .badge-collection { background: rgba(99,102,241,0.12); color: var(--accent); }

    .modal-title { font-size: 16px; font-weight: 700; line-height: 1.4; color: var(--text); }

    .modal-author { font-size: 12px; color: var(--muted); }

    .modal-desc {
      font-size: 13px; color: var(--muted); line-height: 1.6;
      white-space: pre-wrap; word-break: break-word;
      max-height: 120px; overflow-y: auto;
    }

    .modal-stats {
      display: flex; gap: 16px;
      font-size: 12px; color: var(--muted);
    }
    .modal-stat { display: flex; align-items: center; gap: 4px; }

    .modal-tags { display: flex; flex-wrap: wrap; gap: 4px; }

    .modal-divider { border: none; border-top: 1px solid var(--border); margin: 0; }

    .modal-section-label { font-size: 11px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; }

    /* 카테고리 칩 */
    .cat-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
    .cat-chip {
      padding: 4px 10px; border-radius: 20px; font-size: 12px; cursor: pointer;
      border: 1px solid var(--border); color: var(--muted); background: transparent;
      transition: all 0.15s;
    }
    .cat-chip:hover { border-color: var(--accent); color: var(--text); }
    .cat-chip.selected { background: rgba(99,102,241,0.2); border-color: var(--accent); color: var(--accent); }

    .modal-note-label { font-size: 11px; color: var(--muted); font-weight: 600; text-transform: uppercase; }

    .modal-note {
      width: 100%; min-height: 80px; padding: 10px;
      background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
      color: var(--text); font-size: 13px; line-height: 1.5; resize: vertical;
      outline: none;
    }
    .modal-note:focus { border-color: var(--accent); }

    .modal-actions {
      display: flex; gap: 8px; justify-content: flex-end; align-items: center;
    }
    .btn-save {
      padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer;
      background: var(--accent); color: #fff; font-size: 13px; font-weight: 600;
      transition: opacity 0.2s;
    }
    .btn-save:hover { opacity: 0.85; }
    .btn-open {
      padding: 8px 16px; border-radius: 8px; border: 1px solid var(--border);
      color: var(--text); font-size: 13px; text-decoration: none;
      background: transparent; cursor: pointer;
      transition: border-color 0.15s;
    }
    .btn-open:hover { border-color: var(--accent); }
    .modal-close-wrap { display: flex; justify-content: flex-end; padding: 12px 14px 0; }
    .modal-close-btn {
      background: none; border: none; color: var(--muted); font-size: 20px;
      cursor: pointer; line-height: 1; padding: 4px 8px; border-radius: 6px;
    }
    .modal-close-btn:hover { color: var(--text); background: var(--border); }

    /* ── 모바일 ── */
    @media (max-width: 640px) {
      .sidebar { display: none; }
      .grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .topbar { padding: 0 12px; }
      .main { padding: 12px; }
    }
  </style>
</head>
<body>

<div class="app">

  <!-- 상단 헤더 -->
  <header class="topbar">
    <div class="logo">Social Archive</div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" type="text" id="searchInput" placeholder="검색..." />
    </div>
    <span class="total-badge" id="totalBadge">0개</span>
    <button class="icon-btn" id="refreshBtn" title="새로고침">↻</button>
    <button class="icon-btn" id="exportBtn" title="JSON 내보내기">⬇ 내보내기</button>
  </header>

  <div class="body">

    <!-- 사이드바 필터 -->
    <aside class="sidebar">
      <!-- 플랫폼 -->
      <div class="filter-group">
        <div class="filter-group-title">플랫폼<span class="toggle-arrow">▾</span></div>
        <div class="filter-group-body">
          <button class="filter-btn active" data-filter="platform" data-value="all">
            <span class="filter-dot dot-all"></span>전체
            <span class="filter-count" id="cnt-all">0</span>
          </button>
          <button class="filter-btn" data-filter="platform" data-value="instagram">
            <span class="filter-dot dot-instagram"></span>Instagram
            <span class="filter-count" id="cnt-instagram">0</span>
          </button>
          <button class="filter-btn" data-filter="platform" data-value="youtube">
            <span class="filter-dot dot-youtube"></span>YouTube
            <span class="filter-count" id="cnt-youtube">0</span>
          </button>
          <button class="filter-btn" data-filter="platform" data-value="pinterest">
            <span class="filter-dot dot-pinterest"></span>Pinterest
            <span class="filter-count" id="cnt-pinterest">0</span>
          </button>
        </div>
      </div>

      <!-- 수집 소스 -->
      <div class="filter-group">
        <div class="filter-group-title">소스<span class="toggle-arrow">▾</span></div>
        <div class="filter-group-body">
          <button class="filter-btn active" data-filter="source" data-value="all">
            <span class="filter-dot dot-all"></span>전체
          </button>
          <button class="filter-btn" data-filter="source" data-value="liked">
            <span class="filter-dot" style="background:#f59e0b"></span>좋아요
          </button>
          <button class="filter-btn" data-filter="source" data-value="saved">
            <span class="filter-dot" style="background:#22d3ee"></span>저장됨
          </button>
        </div>
      </div>

      <!-- 카테고리 -->
      <div class="filter-group">
        <div class="filter-group-title">카테고리<span class="toggle-arrow">▾</span></div>
        <div class="filter-group-body">
          <div id="categoryFilters"></div>
        </div>
      </div>

      <!-- 정렬 -->
      <div class="filter-group">
        <div class="filter-group-title">정렬<span class="toggle-arrow">▾</span></div>
        <div class="filter-group-body">
          <button class="filter-btn active" data-filter="sort" data-value="savedAt">최신순</button>
          <button class="filter-btn" data-filter="sort" data-value="likeCount">좋아요순</button>
        </div>
      </div>
    </aside>

    <!-- 메인 그리드 -->
    <main class="main">
      <div class="grid" id="grid"></div>
    </main>

  </div>
</div>

<!-- 상세 보기 모달 -->
<div class="modal-overlay hidden" id="detailModal">
  <div class="modal">
    <div class="modal-close-wrap">
      <button class="modal-close-btn" id="modalClose">✕</button>
    </div>
    <div class="modal-thumb-wrap" id="modalThumbWrap"></div>
    <div class="modal-body">
      <div class="modal-meta" id="modalMeta"></div>
      <div class="modal-title" id="modalTitle"></div>
      <div class="modal-author" id="modalAuthor"></div>
      <div class="modal-desc" id="modalDesc"></div>
      <div class="modal-stats" id="modalStats"></div>
      <hr class="modal-divider">
      <div class="modal-section-label">카테고리</div>
      <div class="cat-chips" id="catChips"></div>
      <div class="modal-actions" style="justify-content:flex-start">
        <button class="btn-save" id="saveCatBtn">카테고리 저장</button>
      </div>
      <hr class="modal-divider">
      <div class="modal-section-label">메모</div>
      <textarea class="modal-note" id="modalNote" placeholder="이 콘텐츠에 대한 메모를 남겨보세요..."></textarea>
      <div class="modal-actions">
        <button class="btn-open" id="modalCloseBtn">닫기</button>
        <button class="btn-save" id="saveNoteBtn">메모 저장</button>
        <a class="btn-open" id="modalUrlBtn" target="_blank">원본 보기 →</a>
      </div>
    </div>
  </div>
</div>

<script src="src/sw_register.js"></script>
<script src="src/db/indexeddb.js"></script>
<script src="src/app.js"></script>

</body>
</html>
